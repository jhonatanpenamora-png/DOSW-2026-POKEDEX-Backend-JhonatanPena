name: CI/CD — PokeData OS

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: 21
  MAVEN_CLI_OPTS: -q --no-transfer-progress

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Tests + Calidad
  # ─────────────────────────────────────────
  quality:
    name: Tests y Calidad
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Ejecutar tests + JaCoCo
        run: ./mvnw verify $MAVEN_CLI_OPTS
        env:
          GOOGLE_CLIENT_ID: test-client-id
          GOOGLE_CLIENT_SECRET: test-client-secret
          JWT_SECRET: dGVzdC1zZWNyZXQta2V5LWZvci1wdXJwb3Nlcy1vZi10ZXN0aW5nLWp3dA==

      - name: Subir reporte JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

  # ─────────────────────────────────────────
  # JOB 2: Build Docker (solo en push a main)
  # ─────────────────────────────────────────
  docker:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y push de imagen Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/pokedata-os:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
